<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoTec Motors - Financiamiento para Repuestos</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <!-- CSS personalizado -->
  <link rel="stylesheet" href="/css/financiamiento.css">
</head>
<body>
  <div th:replace="fragments/header :: header"></div>

  <div class="container">
    <h1>Financiamiento Exclusivo para Repuestos</h1>
    <p class="text-center mb-4 text-muted">Completa el formulario y accede a planes flexibles solo para la compra de repuestos automotrices.</p>

    <form id="financiamientoForm" action="/financiamiento/solicitar" method="post">
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" class="form-control" required>
      </div>
      
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>
      
      <div class="mb-3">
        <label for="modelo" class="form-label">Modelo de tu vehículo</label>
        <select id="modelo" name="modelo" class="form-select" required>
          <option value="super deportivo">super deportivo</option>
          <option value="hyper deportivos">hyper deportivos</option>
          <option value="deportivos"> deportivos</option>
        </select>
      </div>
      
      <div class="mb-3">
        <label for="mensaje" class="form-label">Repuestos que deseas financiar</label>
        <textarea id="mensaje" name="mensaje" class="form-control" rows="4" placeholder="Ej: Batería, pastillas de freno, filtros, etc." required></textarea>
      </div>
      
      <button type="submit">
        <i class="fas fa-file-invoice-dollar me-2"></i>Solicitar Financiamiento
      </button>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 AutoTec Motors - Todos los derechos reservados
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script personalizado -->
  <script src="/js/financiamiento.js"></script>
</body>
</html>
