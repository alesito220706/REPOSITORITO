<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestión de Autos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/gestion_autos.css">
    <style>
        .modal-custom {
            display: none;
            position: fixed;
            z-index: 1050;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-custom.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-custom-content {
            background-color: white;
            padding: 0;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/headerAdmin :: headerAdmin"></div> 
            
            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <!-- Alertas -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestión de Modelos</h1>
                    <button class="btn btn-primary" onclick="abrirModalCrear()">
                        <i class="fas fa-plus me-1"></i>Nuevo Modelo
                    </button>
                </div>

                <!-- Tabla de Modelos -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Destacado</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="modelo : ${modelos}">
                                <td>
                                    <img th:src="${modelo.imagenUrl}" alt="Imagen" class="modelo-img" 
                                         onerror="this.src='https://via.placeholder.com/80x60?text=Sin+Imagen'">
                                </td>
                                <td th:text="${modelo.nombre}"></td>
                                <td th:text="${modelo.marca}"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(modelo.precio, 1, 2, 'COMMA')}"></td>
                                <td th:text="${modelo.stock}"></td>
                                <td>
                                    <span th:if="${modelo.destacado}" class="badge bg-warning">
                                        <i class="fas fa-star"></i> Destacado
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${modelo.activo}" class="badge bg-success status-badge">Activo</span>
                                    <span th:unless="${modelo.activo}" class="badge bg-danger status-badge">Inactivo</span>
                                </td>
                                <td class="table-actions">
                                    <a th:href="@{/admin/gestion_autos/editar/{id}(id=${modelo.id})}" 
                                       class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    
                                    <form th:action="@{/admin/gestion_autos/toggle-activo/{id}(id=${modelo.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm" 
                                                th:classappend="${modelo.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                                                th:title="${modelo.activo} ? 'Desactivar' : 'Activar'">
                                            <i th:classappend="${modelo.activo} ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                        </button>
                                    </form>
                                    
                                    <form th:action="@{/admin/gestion_autos/eliminar/{id}(id=${modelo.id})}" method="post" class="d-inline"
                                          th:onclick="return confirm('¿Estás seguro de eliminar este modelo?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Crear Modelo - FUNCIONAL SIN BOOTSTRAP -->
    <div id="modalCrearModelo" class="modal-custom">
        <div class="modal-custom-content">
            <div class="modal-header bg-light border-bottom p-3 d-flex justify-content-between align-items-center">
                <h5 class="modal-title m-0">Crear Nuevo Modelo</h5>
                <button type="button" class="btn-close" onclick="cerrarModalCrear()" aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/gestion_autos/crear}" method="post" th:object="${modelo}">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Nombre *</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required maxlength="100">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Marca *</label>
                                <input type="text" class="form-control" th:field="*{marca}" required maxlength="100">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Motor *</label>
                                <input type="text" class="form-control" th:field="*{motor}" required maxlength="100">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Potencia *</label>
                                <input type="text" class="form-control" th:field="*{potencia}" required maxlength="100">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Velocidad Máxima *</label>
                                <input type="text" class="form-control" th:field="*{velocidadMax}" required maxlength="100">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Precio *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">URL Imagen *</label>
                                <input type="url" class="form-control" th:field="*{imagenUrl}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control" th:field="*{stock}" min="0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select class="form-select" th:field="*{categoria}">
                                    <option value="HYPERCAR">HYPERCAR</option>
                                    <option value="SUPERCAR">SUPERCAR</option>
                                    <option value="SPORTS">SPORTS</option>
                                    <option value="LUXURY">LUXURY</option>
                                </select>
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{destacado}">
                                        <label class="form-check-label">Destacado</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{activo}" checked>
                                        <label class="form-check-label">Activo</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción *</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Aceleración (0-100 km/h)</label>
                        <input type="text" class="form-control" th:field="*{aceleracion}" placeholder="Ej: 2.5 segundos" maxlength="100">
                    </div>
                </div>
                <div class="modal-footer border-top bg-light p-3 d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModalCrear()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Modelo</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script>
        function abrirModalCrear() {
            document.getElementById('modalCrearModelo').classList.add('show');
        }

        function cerrarModalCrear() {
            document.getElementById('modalCrearModelo').classList.remove('show');
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modalCrearModelo').addEventListener('click', function(event) {
            if (event.target === this) {
                cerrarModalCrear();
            }
        });

        // Cerrar modal con tecla Escape
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                cerrarModalCrear();
            }
        });
    </script>
</body>
</html>
