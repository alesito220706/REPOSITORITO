<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Auto TEC</title>
     <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
 <!-- Archivo CSS externo -->
    <link rel="stylesheet" th:href="@{/css/gestion_clientes.css}">
</head>
<body>
    <!-- ====== NAVBAR ====== -->
<div th:replace="fragments/headerAdmin :: headerAdmin"></div>


            <div class="container-fluid">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1><i class="fas fa-users"></i> Gestión de Clientes</h1>
            <button class="btn-add" onclick="abrirModalCliente()">
                <i class="fas fa-plus"></i> Agregar Cliente
            </button>
        </div>

        <div th:if="${mensaje}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="search-section">
            <input type="text" class="form-control" id="buscarCliente" placeholder="Buscar cliente..." onkeyup="filtrarTabla('tablaClientes', this)">
        </div>

        <div class="table-responsive">
            <table class="table" id="tablaClientes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.username}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.nombres + ' ' + usuario.apellidos}"></td>
                        <td><span class="badge bg-info" th:text="${usuario.rol.nombre}"></span></td>
                        <td>
                            <span class="badge" th:classappend="${usuario.activo} ? 'bg-success' : 'bg-danger'" 
                                  th:text="${usuario.activo} ? 'Activo' : 'Inactivo'"></span>
                        </td>
                        <td>
                            <button class="btn-delete" th:onclick="|confirmarEliminarCliente(${usuario.id}, '${usuario.nombres}')|">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalCliente" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCliente" th:action="@{/admin/clientes/guardar}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombres *</label>
                            <input type="text" name="nombres" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellidos *</label>
                            <input type="text" name="apellidos" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña *</label>
                            <input type="password" name="password_hash" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol *</label>
                            <select name="roles_id" class="form-select" required>
                                <option value="">Selecciona un rol</option>
                                <option value="1">CLIENTE</option>
                                <option value="2">VENDEDOR</option>
                                <option value="3">ADMIN</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-check-label">
                                <input type="checkbox" name="activo" class="form-check-input" checked> Cliente Activo
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Cliente</button>
                    </form>
                </div>
            </div>
        </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Archivo JS externo -->
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
</body>
