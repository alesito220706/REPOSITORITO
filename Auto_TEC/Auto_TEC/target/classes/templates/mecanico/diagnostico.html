<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Diagnóstico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/mecanico.css">
</head>
<body>
  <div th:replace="fragments/headerMecanico :: headerMecanico"></div>
  <div class="mech-container">
    <div class="mb-4">
      <span class="mech-eyebrow">Diagnóstico</span>
      <h1 class="mech-page-title"><i class="fas fa-stethoscope me-2"></i>Nuevo Diagnóstico</h1>
    </div>

    <div class="row g-4">
      <div class="col-md-5">
        <div class="card-mech">
          <div class="card-mech-header" th:classappend="${cita.estado.name() == 'PENDIENTE' ? 'badge-pendiente' : 'badge-completado'}">
            <h3 class="card-mech-title"><i class="fas fa-info-circle me-2"></i>Información de la Cita</h3>
          </div>
          <div class="card-mech-body">
            <table class="table-mech">
              <tr><td style="color:var(--mech-muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;width:40%">Cliente</td><td style="font-weight:600" th:text="${cita.usuario.nombres + ' ' + cita.usuario.apellidos}">Cliente</td></tr>
              <tr><td style="color:var(--mech-muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:1px">Tipo</td><td style="font-weight:600" th:text="${cita.tipoCita.name()}">Tipo</td></tr>
              <tr><td style="color:var(--mech-muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:1px">Fecha</td><td th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')}">Fecha</td></tr>
              <tr><td style="color:var(--mech-muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:1px">Estado</td><td><span class="badge-mech" th:classappend="${cita.estado.name() == 'PENDIENTE' ? 'badge-pendiente' : 'badge-completado'}" th:text="${cita.estado.name()}">Estado</span></td></tr>
            </table>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <form method="post" th:action="@{/mecanico/diagnostico/guardar}">
          <input type="hidden" name="citaId" th:value="${cita.id}">

          <div class="card-mech mb-4">
            <div class="card-mech-header">
              <h3 class="card-mech-title"><i class="fas fa-search me-2"></i>Datos del Diagnóstico</h3>
            </div>
            <div class="card-mech-body">
              <div class="mb-3">
                <label class="form-mech-label">Observaciones</label>
                <textarea name="observaciones" class="form-mech" required placeholder="Describa el estado general y observaciones iniciales..."></textarea>
              </div>
              <div class="mb-3">
                <label class="form-mech-label">Fallas Encontradas</label>
                <textarea name="fallasEncontradas" class="form-mech" placeholder="Describa las fallas identificadas..."></textarea>
              </div>
              <div class="mb-3">
                <label class="form-mech-label">Recomendaciones</label>
                <textarea name="recomendaciones" class="form-mech" placeholder="Recomendaciones al cliente..."></textarea>
              </div>
              <div>
                <label class="form-mech-label">Acciones a Seguir</label>
                <textarea name="accionesSeguir" class="form-mech" placeholder="Próximos pasos a realizar..."></textarea>
              </div>
            </div>
          </div>

          <div class="card-mech mb-4">
            <div class="card-mech-header">
              <h3 class="card-mech-title"><i class="fas fa-cogs me-2"></i>Repuestos Asignados</h3>
              <button type="button" class="btn-mech btn-mech-outline" style="font-size:0.55rem;padding:4px 10px" onclick="agregarRepuesto()"><i class="fas fa-plus"></i> Agregar</button>
            </div>
            <div class="card-mech-body">
              <table class="table-mech" id="repuestosTable">
                <thead><tr><th>Repuesto</th><th>Cantidad</th><th></th></tr></thead>
                <tbody id="repuestosBody">
                  <tr id="noRepuestos">
                    <td colspan="3" style="text-align:center;color:var(--mech-muted);font-size:0.75rem"><i class="fas fa-box-open me-2"></i>Ningún repuesto agregado</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <a href="/mecanico/dashboard" class="btn-mech btn-mech-outline"><i class="fas fa-arrow-left"></i> Cancelar</a>
            <button type="submit" name="accion" value="BORRADOR" class="btn-mech btn-mech-outline" style="border-color:var(--mech-cyan);color:var(--mech-cyan)"><i class="fas fa-save"></i> Guardar Borrador</button>
            <button type="submit" name="accion" value="COMPLETADO" class="btn-mech btn-mech-primary"><i class="fas fa-check-circle"></i> Completar Diagnóstico</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    const repuestosDisponibles = [
      /*[# th:each="r : ${repuestos}"]*/{
        id: /*[[${r.id}]]*/ 0,
        nombre: /*[[${r.nombre}]]*/ '',
        codigo: /*[[${r.codigo}]]*/ '',
        precio: /*[[${r.precio}]]*/ 0,
        stock: /*[[${r.stock}]]*/ 0
      }/*[/]*/
    ];
    let repuestoIndex = 0;
    function agregarRepuesto() {
      const tbody = document.getElementById('repuestosBody');
      const noRow = document.getElementById('noRepuestos');
      if (noRow) noRow.remove();

      const idx = repuestoIndex++;
      let opts = repuestosDisponibles.filter(r => r.stock > 0).map(r =>
        `<option value="${r.id}">${r.nombre} (${r.codigo}) - ₡${r.precio}</option>`
      ).join('');

      const tr = document.createElement('tr');
      tr.id = 'repuestoRow_' + idx;
      tr.innerHTML = `
        <td><select name="repuestoIds" class="form-mech" style="font-size:0.75rem">${opts}</select></td>
        <td><input type="number" name="repuestoCantidades" class="form-mech" style="width:80px;font-size:0.75rem" min="1" value="1"></td>
        <td><button type="button" class="btn-mech btn-mech-danger" style="font-size:0.55rem;padding:4px 8px" onclick="eliminarRepuesto('repuestoRow_${idx}')"><i class="fas fa-times"></i></button></td>
      `;
      tbody.appendChild(tr);
    }

    function eliminarRepuesto(rowId) {
      const row = document.getElementById(rowId);
      if (row) row.remove();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
