<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venta Repuestos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/mecanico.css">
</head>
<body>
  <div th:replace="fragments/headerMecanico :: headerMecanico"></div>
  <div class="mech-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <span class="mech-eyebrow">Taller Mecánico</span>
        <h1 class="mech-page-title" style="margin:0"><i class="fas fa-shopping-cart me-2"></i>Venta de Repuestos</h1>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-7">
        <div class="card-mech">
          <div class="card-mech-header">
            <h3 class="card-mech-title"><i class="fas fa-boxes me-2"></i>Repuestos Disponibles</h3>
          </div>
          <div class="card-mech-body" style="padding:0">
            <table class="table-mech">
              <thead><tr><th>Código</th><th>Nombre</th><th>Stock</th><th>Precio</th><th></th></tr></thead>
              <tbody>
                <tr th:each="r : ${repuestos}">
                  <td><span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--mech-cyan)" th:text="${r.codigo}">COD</span></td>
                  <td><span style="font-weight:600" th:text="${r.nombre}">Nombre</span></td>
                  <td><span class="badge-mech" th:classappend="${r.stock < 3 ? 'badge-pendiente' : 'badge-completado'}" th:text="${r.stock}">Stock</span></td>
                  <td th:text="'₡' + ${#numbers.formatDecimal(r.precio, 0, 2)}">₡0.00</td>
                  <td><button class="btn-mech btn-mech-primary" style="font-size:0.55rem;padding:4px 10px" th:data-id="${r.id}" th:data-nombre="${r.nombre}" th:data-codigo="${r.codigo}" th:data-precio="${r.precio}" th:data-stock="${r.stock}" onclick="agregarItem(this)">+</button></td>
                </tr>
                <tr th:if="${repuestos.empty}">
                  <td colspan="5" style="text-align:center;color:var(--mech-muted);padding:30px">Sin repuestos disponibles</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-md-5">
        <div class="card-mech">
          <div class="card-mech-header">
            <h3 class="card-mech-title"><i class="fas fa-receipt me-2"></i>Carrito</h3>
            <span class="badge-mech badge-completado" id="itemCount">0</span>
          </div>
          <div class="card-mech-body">
            <form method="post" th:action="@{/mecanico/venta/generar}" id="ventaForm">
              <table class="table-mech mb-3" id="carritoTable">
                <thead><tr><th>Item</th><th>Cant</th><th>Total</th><th></th></tr></thead>
                <tbody id="carritoBody">
                  <tr id="carritoVacio">
                    <td colspan="4" style="text-align:center;color:var(--mech-muted);font-size:0.75rem;padding:20px"><i class="fas fa-cart-plus me-2"></i>Agrega repuestos</td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr>
                    <td colspan="2" style="text-align:right;font-weight:700;font-size:0.85rem">Total:</td>
                    <td style="font-weight:800;font-size:1rem;color:var(--mech-cyan)" id="totalDisplay">₡0.00</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
              <button type="submit" class="btn-mech btn-mech-primary w-100" id="btnGenerar" disabled><i class="fas fa-file-invoice"></i> Generar Boleta</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let items = [];
    let idx = 0;

    function agregarItem(btn) {
      const id = btn.getAttribute('data-id');
      const nombre = btn.getAttribute('data-nombre');
      const codigo = btn.getAttribute('data-codigo');
      const precio = parseFloat(btn.getAttribute('data-precio'));
      const stock = parseInt(btn.getAttribute('data-stock'));

      const existente = items.find(i => i.id === id);
      if (existente) {
        if (existente.cant < stock) {
          existente.cant++;
        } else { alert('Stock máximo alcanzado'); return; }
      } else {
        items.push({ id, nombre, codigo, precio, cant: 1, stock });
      }
      renderCarrito();
    }

    function cambiarCant(id, delta) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const nueva = item.cant + delta;
      if (nueva < 1) { items = items.filter(i => i.id !== id); }
      else if (nueva <= item.stock) { item.cant = nueva; }
      else { alert('Stock máximo: ' + item.stock); return; }
      renderCarrito();
    }

    function renderCarrito() {
      const tbody = document.getElementById('carritoBody');
      const vacio = document.getElementById('carritoVacio');
      const btnGen = document.getElementById('btnGenerar');
      document.getElementById('itemCount').textContent = items.length;

      tbody.querySelectorAll('tr:not(#carritoVacio)').forEach(el => el.remove());

      if (items.length === 0) {
        if (vacio) vacio.style.display = '';
        btnGen.disabled = true;
        document.getElementById('totalDisplay').textContent = '₡0.00';
        return;
      }
      if (vacio) vacio.style.display = 'none';
      btnGen.disabled = false;

      let total = 0;
      items.forEach(item => {
        const subtotal = item.precio * item.cant;
        total += subtotal;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span style="font-weight:600;font-size:0.8rem">${item.nombre}</span><br><span style="font-size:0.6rem;color:var(--mech-muted)">${item.codigo}</span></td>
          <td>
            <button type="button" class="btn-mech btn-mech-outline" style="font-size:0.5rem;padding:2px 6px" onclick="cambiarCant('${item.id}', -1)">-</button>
            <span style="margin:0 4px;font-weight:700">${item.cant}</span>
            <button type="button" class="btn-mech btn-mech-outline" style="font-size:0.5rem;padding:2px 6px" onclick="cambiarCant('${item.id}', 1)">+</button>
            <input type="hidden" name="repuestoIds" value="${item.id}">
            <input type="hidden" name="cantidades" value="${item.cant}">
          </td>
          <td style="font-weight:700;font-size:0.8rem">₡${subtotal.toFixed(2)}</td>
          <td><button type="button" class="btn-mech btn-mech-danger" style="font-size:0.5rem;padding:2px 6px" onclick="cambiarCant('${item.id}', -99)"><i class="fas fa-times"></i></button></td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('totalDisplay').textContent = '₡' + total.toFixed(2);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
