<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Mecánico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/mecanico.css">
</head>
<body>
  <div th:replace="fragments/headerMecanico :: headerMecanico"></div>
  <div class="mech-container">
    <div class="mb-4">
      <span class="mech-eyebrow">Taller Mecánico</span>
      <h1 class="mech-page-title"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</h1>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="color:var(--mech-cyan)"><i class="fas fa-calendar-check"></i></div>
        <div class="stat-value" th:text="${citasPendientes}">0</div>
        <div class="stat-label">Citas Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="color:var(--mech-gold)"><i class="fas fa-clipboard-list"></i></div>
        <div class="stat-value" th:text="${diagnosticosPendientes}">0</div>
        <div class="stat-label">Diagnósticos Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="color:var(--mech-green)"><i class="fas fa-cogs"></i></div>
        <div class="stat-value" th:text="${totalRepuestos}">0</div>
        <div class="stat-label">Repuestos</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="color:var(--mech-orange)"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-value" th:text="${repuestosBajos}">0</div>
        <div class="stat-label">Stock Bajo</div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card-mech">
          <div class="card-mech-header">
            <h3 class="card-mech-title"><i class="fas fa-calendar-alt me-2"></i>Citas Asignadas</h3>
          </div>
          <div class="card-mech-body">
            <table class="table-mech">
              <thead><tr><th>Cliente</th><th>Tipo</th><th>Fecha</th><th>Estado</th><th></th></tr></thead>
              <tbody>
                <tr th:each="c : ${citasRecientes}">
                  <td th:text="${c.usuario.nombres + ' ' + c.usuario.apellidos}">Cliente</td>
                  <td th:text="${c.tipoCita.name()}">Tipo</td>
                  <td th:text="${#temporals.format(c.fechaCita, 'dd/MM/yyyy')}">Fecha</td>
                  <td><span class="badge-mech" th:classappend="${c.estado.name() == 'PENDIENTE' ? 'badge-pendiente' : 'badge-completado'}" th:text="${c.estado.name()}">Estado</span></td>
                  <td><a th:href="@{/mecanico/diagnostico/nuevo/{id}(id=${c.id})}" class="btn-mech btn-mech-primary" style="font-size:0.6rem">Diagnosticar</a></td>
                </tr>
                <tr th:if="${citasRecientes.empty}">
                  <td colspan="5" style="text-align:center;color:var(--mech-muted);padding:30px;font-size:0.85rem"><i class="fas fa-inbox me-2"></i>No hay citas asignadas</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card-mech">
          <div class="card-mech-header">
            <h3 class="card-mech-title"><i class="fas fa-stethoscope me-2"></i>Últimos Diagnósticos</h3>
            <span class="badge-mech" style="font-size:0.55rem" th:text="${diagnosticos.size() + ' registros'}">0</span>
          </div>
          <div class="card-mech-body">
            <table class="table-mech">
              <thead><tr><th>Cliente</th><th>Fecha</th><th>Estado</th><th></th></tr></thead>
              <tbody>
                <tr th:each="d, stat : ${diagnosticos}" th:if="${stat.index < 5}">
                  <td><span style="font-weight:600" th:text="${d.cita.usuario.nombres + ' ' + d.cita.usuario.apellidos}">Cliente</span></td>
                  <td th:text="${#temporals.format(d.fechaCreacion, 'dd/MM/yyyy')}">Fecha</td>
                  <td><span class="badge-mech" th:classappend="${d.estado == 'BORRADOR' ? 'badge-borrador' : 'badge-completado'}" th:text="${d.estado}">Estado</span></td>
                  <td><a th:href="@{/mecanico/diagnostico/ver/{id}(id=${d.id})}" class="btn-mech btn-mech-outline" style="font-size:0.6rem">Ver</a></td>
                </tr>
                <tr th:if="${diagnosticos.empty}">
                  <td colspan="4" style="text-align:center;color:var(--mech-muted);padding:30px;font-size:0.85rem"><i class="fas fa-stethoscope me-2"></i>Sin diagnósticos aún</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
