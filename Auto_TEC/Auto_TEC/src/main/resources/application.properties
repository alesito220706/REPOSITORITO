spring.application.name=Auto_TEC

# Configuración para PostgreSQL en Render
spring.datasource.url=jdbc:postgresql://dpg-d4gurkggjchc73fd4eug-a.oregon-postgres.render.com:5432/auto_tec_qclc
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=TTrs8WID0QLFlPIin7m1eUSK6yZYNAAm

# Configuración de JPA/Hibernate para PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Deshabilitar consola H2
spring.h2.console.enabled=false

# Configuración del servidor
server.port=8080

# Configuraciones de Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8

# Configuración de logging
logging.level.org.hibernate.SQL=DEBUG
spring.thymeleaf.cache=false
logging.level.com.organization.Auto_TEC.Service.CustomUserDetailsService=DEBUG
logging.level.com.organization.Auto_TEC.Config=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security.web=DEBUG

# Configuración específica para PostgreSQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Pool de conexiones (recomendado para producción)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=120000