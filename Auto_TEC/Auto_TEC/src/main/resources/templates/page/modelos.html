<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos Exclusivos | AutoTEC Motors</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/modelos.css}">
</head>
<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="main-layout">
        <aside class="sidebar-nav">
            <div class="brand-section">
                <span class="small-title">Catálogo de Ingeniería</span>
                <h2 class="cinzel text-gold">Modelos</h2>
            </div>
            
            <ul class="model-list">
                <li th:each="m : ${modelos}" 
                    class="model-link"
                    th:data-id="${m.id}"
                    th:data-img="${m.imagenUrl}"
                    th:data-desc="${m.descripcion}"
                    th:data-year="${m.anio}"
                    th:data-engine="${m.motor}"
                    th:data-power="${m.potencia}"
                    th:data-price="'$' + ${#numbers.formatDecimal(m.precio, 0, 'COMMA', 2, 'POINT')}"
                    th:data-equipment="${m.equipamiento}"
                    th:text="${m.nombre}">
                </li>
            </ul>
        </aside>

        <main class="showcase">
            <div class="image-display">
                <img src="" class="main-preview-img" id="heroImage" alt="AutoTEC Luxury">
                
                <div class="info-overlay">
                    <div class="overlay-content" id="heroContent">
                        <h1 class="display-title cinzel"></h1>
                        <p class="display-desc text-secondary"></p>
                        
                        <div class="specs-row" id="heroSpecs">
                            </div>

                        <div class="action-zone">
                            <button class="btn-luxe" id="btnExplorarIngenieria">
                                <i class="fas fa-plus-circle me-2"></i> Explorar Ingeniería
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalModelo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content luxe-modal-bg">
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <div class="col-lg-7">
                            <img id="modalImagen" src="" class="img-fluid w-100 h-100 object-fit-cover">
                        </div>
                        <div class="col-lg-5 p-5">
                            <h2 id="modalNombre" class="cinzel text-gold mb-3"></h2>
                            <p id="modalDescripcion" class="text-secondary small mb-4"></p>
                            <div id="modalDetailsGrid">
                                </div>
                            <button class="btn-gold-fill w-100 mt-4" id="btnSolicitarCotizacion">Solicitar Cotización</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCotiza" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content luxe-modal-bg p-4">
                <h3 class="cinzel text-gold text-center mb-4">Cotización Premium</h3>
                <form id="cotizaForm">
                    <input type="hidden" id="cotizaModelo">
                    <div class="mb-3">
                        <input type="text" id="cotizaNombre" class="form-control l-input" placeholder="Nombre completo" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="cotizaEmail" class="form-control l-input" placeholder="Correo electrónico" required>
                    </div>
                    <button type="submit" class="btn-gold-fill w-100" id="cotizaSubmit">Confirmar Solicitud</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/modelos.js}"></script>
</body>
</html>
