<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repuestos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/mecanico.css">
</head>
<body>
  <div th:replace="fragments/headerMecanico :: headerMecanico"></div>
  <div class="mech-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <span class="mech-eyebrow">Inventario</span>
        <h1 class="mech-page-title" style="margin:0"><i class="fas fa-cogs me-2"></i>Repuestos</h1>
      </div>
      <button class="btn-mech btn-mech-primary" data-bs-toggle="modal" data-bs-target="#nuevoRepuestoModal"><i class="fas fa-plus"></i> Nuevo</button>
    </div>

    <div class="card-mech mb-4">
      <div class="card-mech-body">
        <form method="get" class="d-flex gap-2">
          <input type="text" name="q" class="form-mech" placeholder="Buscar por nombre, código o categoría..." th:value="${query}" style="flex:1">
          <button type="submit" class="btn-mech btn-mech-primary"><i class="fas fa-search"></i> Buscar</button>
          <a th:if="${query != null}" href="/mecanico/repuestos" class="btn-mech btn-mech-outline"><i class="fas fa-times"></i></a>
        </form>
      </div>
    </div>

    <div class="card-mech">
      <div class="card-mech-body" style="padding:0">
        <table class="table-mech">
          <thead><tr><th>Código</th><th>Nombre</th><th>Categoría</th><th>Stock</th><th>Precio</th><th style="text-align:right">Acciones</th></tr></thead>
          <tbody>
            <tr th:each="r : ${repuestos}">
              <td><span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--mech-cyan)" th:text="${r.codigo}">COD</span></td>
              <td><span style="font-weight:600" th:text="${r.nombre}">Nombre</span></td>
              <td th:text="${r.categoria}">Categoría</td>
              <td>
                <span class="badge-mech" th:classappend="${r.stock < 5 ? 'badge-pendiente' : 'badge-completado'}" th:text="${r.stock + ' uds'}">Stock</span>
              </td>
              <td th:text="'₡' + ${#numbers.formatDecimal(r.precio, 0, 2)}">₡0.00</td>
              <td style="text-align:right">
                <button class="btn-mech btn-mech-outline" style="font-size:0.55rem;padding:4px 10px" th:data-id="${r.id}" onclick="editarRepuesto(this)"><i class="fas fa-edit"></i></button>
                <form method="post" th:action="@{/mecanico/repuestos/eliminar/{id}(id=${r.id})}" style="display:inline" onsubmit="return confirm('¿Eliminar este repuesto?')">
                  <button type="submit" class="btn-mech btn-mech-danger" style="font-size:0.55rem;padding:4px 10px"><i class="fas fa-trash"></i></button>
                </form>
              </td>
            </tr>
            <tr th:if="${repuestos.empty}">
              <td colspan="6" style="text-align:center;color:var(--mech-muted);padding:40px;font-size:0.85rem"><i class="fas fa-box-open me-2"></i>No se encontraron repuestos</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Nuevo Repuesto -->
  <div class="modal fade" id="nuevoRepuestoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width:500px">
      <div class="modal-content" style="background:var(--mech-card);border:1px solid var(--mech-border);border-radius:12px">
        <div class="modal-header" style="border-bottom:1px solid var(--mech-border);padding:16px 20px">
          <h5 class="modal-title" style="color:var(--mech-cyan);font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px"><i class="fas fa-plus-circle me-2"></i>Nuevo Repuesto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form method="post" th:action="@{/mecanico/repuestos/guardar}">
          <div class="modal-body" style="padding:20px">
            <div class="mb-3">
              <label class="form-mech-label">Código</label>
              <input type="text" name="codigo" class="form-mech" required>
            </div>
            <div class="mb-3">
              <label class="form-mech-label">Nombre</label>
              <input type="text" name="nombre" class="form-mech" required>
            </div>
            <div class="mb-3">
              <label class="form-mech-label">Categoría</label>
              <input type="text" name="categoria" class="form-mech" placeholder="Ej: Motor, Frenos, Suspensión...">
            </div>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-mech-label">Stock</label>
                <input type="number" name="stock" class="form-mech" min="0" value="0">
              </div>
              <div class="col-6">
                <label class="form-mech-label">Precio (₡)</label>
                <input type="number" step="0.01" name="precio" class="form-mech" min="0" value="0">
              </div>
            </div>
          </div>
          <div class="modal-footer" style="border-top:1px solid var(--mech-border);padding:12px 20px">
            <button type="button" class="btn-mech btn-mech-outline" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn-mech btn-mech-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Editar Repuesto -->
  <div class="modal fade" id="editarRepuestoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width:500px">
      <div class="modal-content" style="background:var(--mech-card);border:1px solid var(--mech-border);border-radius:12px">
        <div class="modal-header" style="border-bottom:1px solid var(--mech-border);padding:16px 20px">
          <h5 class="modal-title" style="color:var(--mech-cyan);font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px"><i class="fas fa-edit me-2"></i>Editar Repuesto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form method="post" id="editarRepuestoForm">
          <div class="modal-body" style="padding:20px">
            <div class="mb-3">
              <label class="form-mech-label">Código</label>
              <input type="text" name="codigo" id="editCodigo" class="form-mech" required>
            </div>
            <div class="mb-3">
              <label class="form-mech-label">Nombre</label>
              <input type="text" name="nombre" id="editNombre" class="form-mech" required>
            </div>
            <div class="mb-3">
              <label class="form-mech-label">Categoría</label>
              <input type="text" name="categoria" id="editCategoria" class="form-mech">
            </div>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-mech-label">Stock</label>
                <input type="number" name="stock" id="editStock" class="form-mech" min="0">
              </div>
              <div class="col-6">
                <label class="form-mech-label">Precio (₡)</label>
                <input type="number" step="0.01" name="precio" id="editPrecio" class="form-mech" min="0">
              </div>
            </div>
          </div>
          <div class="modal-footer" style="border-top:1px solid var(--mech-border);padding:12px 20px">
            <button type="button" class="btn-mech btn-mech-outline" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn-mech btn-mech-primary">Actualizar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    async function editarRepuesto(btn) {
      const id = btn.getAttribute('data-id');
      const resp = await fetch('/mecanico/repuestos/editar/' + id);
      const r = await resp.json();
      document.getElementById('editCodigo').value = r.codigo || '';
      document.getElementById('editNombre').value = r.nombre || '';
      document.getElementById('editCategoria').value = r.categoria || '';
      document.getElementById('editStock').value = r.stock || 0;
      document.getElementById('editPrecio').value = r.precio || 0;
      document.getElementById('editarRepuestoForm').action = '/mecanico/repuestos/actualizar/' + id;
      new bootstrap.Modal(document.getElementById('editarRepuestoModal')).show();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
